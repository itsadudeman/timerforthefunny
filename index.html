<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4-Letter Name Finder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 50px; background: #111; color: white; }
        .container { background: #222; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .name-box { font-size: 48px; font-family: monospace; color: #00ff41; margin: 20px; letter-spacing: 5px; }
        button { padding: 12px 25px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-size: 16px; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .check-link { display: block; margin-top: 20px; color: #aaa; text-decoration: none; font-size: 14px; }
        .check-link:hover { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h2>4-Letter Finder</h2>
        <div class="name-box" id="display">????</div>
        <button onclick="generateName()">Generate & Prep Link</button>
        <a id="checker" class="check-link" target="_blank">Click here to check if taken</a>
    </div>

    <script>
        function generateName() {
            // Characters allowed by Roblox: Letters, Numbers, and one Underscore
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
            let result = "";
            for (let i = 0; i < 4; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            document.getElementById("display").innerText = result;
            
            // Updates the link to search Roblox for that specific user
            const searchUrl = "https://www.roblox.com/search/users?keyword=" + result;
            const linkElem = document.getElementById("checker");
            linkElem.href = searchUrl;
            linkElem.innerText = "Check availability for: " + result;
        }
    </script>

</body>
</html>
